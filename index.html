<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Hanse - Handelsspiel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header id="hud">
  <div class="hud-item"><span class="label">Datum</span><span id="hud-date">Tag 1</span></div>
  <div class="hud-item"><span class="label">Gold</span><span id="hud-gold">0</span></div>
  <div class="hud-item"><span class="label">Schiff</span><span id="hud-ship-status">in Lübeck</span></div>
  <div class="hud-item"><span class="label">Fracht</span><span id="hud-cargo">0/0</span></div>
  <div class="hud-item"><span class="label">Vermögen</span><span id="hud-networth">0</span></div>
</header>

<main id="game">
  <canvas id="map-canvas" width="760" height="560"></canvas>

  <aside id="sidebar">
    <div class="tabs">
      <button class="tab-btn active" data-tab="market">Markt</button>
      <button class="tab-btn" data-tab="kontor">Kontor</button>
      <button class="tab-btn" data-tab="log">Log</button>
    </div>

    <section id="tab-market" class="tab-panel active">
      <h2 id="market-city-name">-</h2>
      <table id="market-table">
        <thead>
          <tr><th>Ware</th><th>Kaufen</th><th>Verkaufen</th><th>Lager</th><th>Menge</th><th></th><th></th></tr>
        </thead>
        <tbody id="market-tbody"></tbody>
      </table>
      <p id="market-hint" class="hint"></p>
    </section>

    <section id="tab-kontor" class="tab-panel">
      <h2>Kontor</h2>
      <div id="kontor-info"></div>
    </section>

    <section id="tab-log" class="tab-panel">
      <h2>Ereignisse</h2>
      <ul id="event-log"></ul>
    </section>
  </aside>
</main>

<div id="pirate-modal" class="modal hidden">
  <div class="modal-box">
    <h2>Piraten in Sicht!</h2>
    <p id="pirate-text"></p>
    <div class="modal-actions">
      <button id="pirate-fight">Kämpfen</button>
      <button id="pirate-flee">Fliehen</button>
    </div>
  </div>
</div>

<div id="travel-overlay" class="hidden">
  <div class="travel-box">
    <p id="travel-text">Unterwegs nach ...</p>
    <div class="travel-bar"><div id="travel-bar-fill"></div></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/market.js"></script>
<script src="js/ship.js"></script>
<script src="js/kontor.js"></script>
<script src="js/pirates.js"></script>
<script src="js/map.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
